{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter your username"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button type="submit" class="btn btn-primary">
                            Login
                        </button>

                    </div>

                </form>

                <hr>

                <p class="text-center">

                    Don't have an account?

                    <a href="{% url 'register' %}">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
