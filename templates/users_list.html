{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">All Users</h2>

{% for profile in profiles %}

<div class="card shadow-sm mb-3">

    <div class="card-body">

        <h5>{{ profile.user.username }}</h5>

        <p>{{ profile.bio }}</p>

        <a href="{% url 'user_profile' profile.user.username %}"
           class="btn btn-primary btn-sm">

            View Profile

        </a>

    </div>

</div>

{% endfor %}

{% endblock %}
